<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Education - Your Name</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
</head>
<body>
    <!-- Header -->
    <header>
        <div class="header-left">
            <h1>Mohamed Aseel</h1>
        </div>
        <nav class="header-right">
            <a href="index.html">Profile</a>
            <a href="education.html">Education</a>
            <a href="skills.html">Skills</a>
            <a href="projects.html">Projects</a>
            <a href="certifications.html">Certifications</a>
            <a href="contact.html">Contact</a>
            <a href="gallery.html">Gallery</a>
        </nav>
    </header>

    <!-- Education Section -->
    <section id="education" class="education-section">
        <h2>Education</h2>
        <div class="education-container">
            <div class="education-item" data-details="I completed my 10th grade at Islamic Model Matriculation Higher Secondary School, achieving a score of 309 out of 500." data-image="assets\IMS.jpg">
                <h3>10th Grade</h3>
            </div>
            <div class="education-item" data-details="I finished my 10th grade at St. Mary Goretty Higher Secondary School, where I scored 375 out of 600, and I selected computer science as my area of focus." data-image="path/to/your/12th-grade-image.jpg">
                <h3>12th Grade</h3>
            </div>
            <div class="education-item" data-details="I earned my undergraduate degree at Scott Christian College in Nagercoil, where I specialized in B.Sc. Computer Science and achieved a CGPA of 7.4 in my exams." data-image="path/to/your/ug-image.jpg">
                <h3>Undergraduate</h3>
            </div>
            <div class="education-item" data-details="Postgraduate: MCA, ABC University, 2023 - Present" data-image="path/to/your/pg-image.jpg">
                <h3>Postgraduate</h3>
            </div>
        </div>
        <div class="education-details" id="education-details">
            <p>Select a class to view details...</p>
        </div>
    </section>

    <script>
        // JavaScript to handle hover effect
        document.querySelectorAll('.education-item').forEach(item => {
            item.addEventListener('mouseenter', () => {
                const details = item.getAttribute('data-details');
                const image = item.getAttribute('data-image');
                document.getElementById('education-details').innerHTML = `<strong>Details:</strong> ${details}`;
                document.getElementById('education-details').style.backgroundImage = `url(${image})`;
                document.getElementById('education-details').style.backgroundSize = 'cover';
                document.getElementById('education-details').style.backgroundPosition = 'center';
            });
            item.addEventListener('mouseleave', () => {
                document.getElementById('education-details').innerHTML = 'Select a class to view details...';
                document.getElementById('education-details').style.backgroundImage = 'none'; // Reset background
            });
        });
    </script>
</body>
</html>
